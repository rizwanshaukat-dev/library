<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"rel="stylesheet">
    <title>Library</title>
</head>

<body>
    <header>
        <img src="logo.png" alt="Library logo">
        <button class="addbook" id="addbook-btn" >Add a Book</button>
    </header>
    <main>
        <dialog class="bookInputCard">
            <span id="closeBtn" >&times;</span>
            <label for="bookName">Book Name:</label>
            <input type="text" name="bookname" id="bookName" value="">
            <label for="authName">Author:</label>
            <input type="text" name="authname" id="authName" value="">
            <label for="pages">Total Pages:</label>
            <input type="number" name="page" id="pages" value="">
            <label for="readStat">Have you read it:</label>
            <select name="readstat" id="readStat" required>
                <option value="" disabled selected>Select status</option>
                <option value="Read">Read</option>
                <option value="Not Read">Not Read</option>
            </select>
            <button class="btn submit" id="submit-btn" >Submit</button>
        </dialog>
        <div class="bookContainer">

        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
